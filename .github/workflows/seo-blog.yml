name: SEO Blog Articles

# Manual trigger — run from GitHub → Actions → SEO Blog Articles → Run workflow
# Generates markdown blog articles that link internally to clause pages.
# Articles are committed back to the repo and published on next Vercel deploy.
on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Article slug keyword to target (e.g. 'freelance', 'nda'). Leave blank for all."
        required: false
        default: ""
      force:
        description: "Overwrite existing articles"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: seo-blog
  cancel-in-progress: false

jobs:
  generate:
    name: "Generate blog articles"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.18.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILTER: ${{ inputs.filter }}
          FORCE: ${{ inputs.force }}
        run: |
          ARGS=""
          if [ -n "$FILTER" ]; then
            ARGS="$FILTER"
          fi
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          pnpm exec tsx scripts/generate-blog-articles.ts $ARGS

      - name: Commit generated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            git commit -m "feat(blog): auto-generate SEO articles linking to clause pages"
            git push
          fi

      # ── Trigger Vercel redeploy ───────────────────────────────
      - name: Trigger Vercel deploy
        if: env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" -X POST "$VERCEL_DEPLOY_HOOK"
          echo " — Vercel deploy triggered"
